name: Project 1 CI

on:
  pull_request:
    paths:
      - "01-ai-marketing-ops-agent/**"
      - ".github/workflows/project-1-ci.yml"
      - "AGENTS.md"
      - "docs/CODEX_HANDOFF_AI_AUTOMATION_PORTFOLIO.md"
      - "README.md"
  push:
    branches:
      - main
    paths:
      - "01-ai-marketing-ops-agent/**"
      - ".github/workflows/project-1-ci.yml"
      - "AGENTS.md"
      - "docs/CODEX_HANDOFF_AI_AUTOMATION_PORTFOLIO.md"
      - "README.md"

permissions:
  contents: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: 01-ai-marketing-ops-agent

    env:
      LLM_INTERPRETATION_ENABLED: "false"
      LLM_PROVIDER: mock
      NOTIFICATION_DELIVERY_ENABLED: "false"
      NOTIFICATION_PROVIDER: mock

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 01-ai-marketing-ops-agent/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright Chromium
        run: uv run playwright install chromium

      - name: Run pytest
        run: uv run pytest

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy src

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Check shell script syntax
        run: |
          for script in scripts/*.sh; do
            bash -n "$script"
          done
